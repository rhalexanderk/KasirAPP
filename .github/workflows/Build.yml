name: Build App

on: [push]

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt
      - run: pip install pyinstaller

      - run: pyinstaller --onefile --add-data "kasir.db;." main.py

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt
      - run: pip install pyinstaller

      - run: pyinstaller --onefile --add-data "kasir.db:." main.py

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*
